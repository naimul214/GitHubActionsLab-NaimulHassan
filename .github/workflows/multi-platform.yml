name: Multi-Platform Testing

on:
  pull_request:
    branches: [ main ] # Triggers on PR to main 

jobs:
  ubuntu-job:
    runs-on: ubuntu-latest 
    steps:
      - uses: actions/checkout@v4 
      - name: OS Info
        run: uname -a 
      - name: File Ops
        run: echo "Linux test" > test.txt && cat test.txt

  windows-job:
    runs-on: windows-latest 
    steps:
      - uses: actions/checkout@v4
      - name: OS Info
        run: systeminfo | findstr /B /C:"OS Name" /C:"OS Version" 
      - name: File Ops
        run: |
          echo "Windows test" > win-test.txt
          type win-test.txt

  macos-job:
    runs-on: macos-latest 
    steps:
      - uses: actions/checkout@v4
      - name: OS Info
        run: sw_vers 
      - name: File Ops
        run: echo "Mac test" > mac.txt && cat mac.txt