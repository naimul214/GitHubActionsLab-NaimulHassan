name: Environment and Secrets Workflow

on:
    workflow_dispatch: # Allows manual trigger 

env: # Workflow-level variables 
  AWS_REGION: us-east-1
  ENVIRONMENT: production

jobs:
  deploy-to-aws:
    runs-on: ubuntu-latest
    env:
      DEPLOYMENT_NAME: AI-App-Instance # Job-level variable 
    steps:
      - name: Print Global Env
        run: |
          echo "Region: $AWS_REGION"
          echo "Env: $ENVIRONMENT"
      
      - name: Access Secrets
        run: |
          echo "AWS Key: ${{ secrets.AWS_ACCESS_KEY_ID }}"
          echo "AWS Secret: ${{ secrets.AWS_SECRET_ACCESS_KEY }}"

      - name: Step Level Variable
        env:
          STEP_VERSION: "v1.0.0" 
        run: echo "Deploying $DEPLOYMENT_NAME version $STEP_VERSION"